<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Needle — 바다, 커피, 그리고 턴테이블</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --black:#121110;
  --panel:#1b1916;
  --panel-2:#221f1b;
  --line:#3a352e;
  --line-soft:#2a2622;
  --ink:#ece6da;
  --ink-dim:#a89f92;
  --ink-faint:#6e665c;
  --wood:#8a5a35;
  --wood-dark:#5b3a22;
  --wood-light:#c98f54;
  --sea:#33474a;
  --danger:#b5483f;
  --danger-light:#d97268;
  --radius:7px;
  --radius-lg:14px;
  --font-display:'Gowun Batang', serif;
  --font-body:'Noto Sans KR', sans-serif;
  --font-mono:'JetBrains Mono', monospace;
  --shadow:0 8px 28px rgba(0,0,0,.45);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--black);
  color:var(--ink);
  font-family:var(--font-body);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
img{max-width:100%;display:block;}
button{font-family:inherit;cursor:pointer;}
a{color:inherit;}
:focus-visible{outline:2px solid var(--wood-light);outline-offset:2px;}
::selection{background:var(--wood-dark);color:var(--ink);}
.hidden{display:none !important;}

/* ---------- layout shell ---------- */
#app{min-height:100vh;display:flex;flex-direction:column;}

/* ---------- nav ---------- */
.nav{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px;
  background:rgba(18,17,16,.92);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line-soft);
}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mark{
  width:40px;height:40px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--wood-light), var(--wood) 55%, var(--wood-dark) 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:700;font-size:18px;color:#1b1310;
  border:2px solid var(--line);
  flex:none;overflow:hidden;
}
.brand-mark img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.brand-text{display:flex;flex-direction:column;line-height:1.15;}
.brand-name{font-family:var(--font-display);font-size:21px;letter-spacing:.5px;}
.brand-tagline{font-size:11px;color:var(--ink-faint);letter-spacing:.3px;}
.nav-links{display:flex;align-items:center;gap:6px;}
.nav-link{
  background:none;border:1px solid transparent;color:var(--ink-dim);
  padding:9px 16px;border-radius:999px;font-size:14px;letter-spacing:.2px;
  transition:.18s;
}
.nav-link:hover{color:var(--ink);border-color:var(--line);}
.nav-link.active{color:var(--black);background:var(--wood-light);font-weight:600;}
.nav-admin{
  margin-left:6px;background:none;border:1px solid var(--line);color:var(--ink-faint);
  padding:8px 14px;border-radius:999px;font-size:12px;letter-spacing:.3px;display:flex;align-items:center;gap:6px;
}
.nav-admin:hover{color:var(--wood-light);border-color:var(--wood-dark);}
.nav-burger{display:none;background:none;border:1px solid var(--line);border-radius:8px;width:42px;height:38px;align-items:center;justify-content:center;color:var(--ink);}
.nav-burger span{display:block;width:18px;height:2px;background:var(--ink);position:relative;}
.nav-burger span::before,.nav-burger span::after{content:'';position:absolute;left:0;width:18px;height:2px;background:var(--ink);}
.nav-burger span::before{top:-6px;}
.nav-burger span::after{top:6px;}
.nav-mobile{display:none;}

/* ---------- hero ---------- */
.hero{
  position:relative;
  padding:64px 28px 0;
  display:grid;grid-template-columns:1.1fr .9fr;gap:40px;align-items:center;
  max-width:1180px;margin:0 auto;
  overflow:hidden;
}
.hero-copy .eyebrow{
  font-family:var(--font-mono);font-size:12px;letter-spacing:2px;color:var(--wood-light);
  text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:10px;
}
.hero-copy .eyebrow::before{content:'';width:22px;height:1px;background:var(--wood-light);display:inline-block;}
.hero-copy h1{
  font-family:var(--font-display);font-weight:700;
  font-size:clamp(34px,5vw,56px);line-height:1.18;margin:0 0 22px;
}
.hero-copy p{color:var(--ink-dim);font-size:16px;max-width:460px;margin:0 0 30px;}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;}
.btn{
  border-radius:999px;padding:13px 26px;font-size:14px;font-weight:600;border:1px solid transparent;
  transition:.18s;letter-spacing:.2px;
}
.btn-primary{background:var(--wood-light);color:#211608;}
.btn-primary:hover{background:#dba868;}
.btn-ghost{background:none;border:1px solid var(--line);color:var(--ink);}
.btn-ghost:hover{border-color:var(--wood-light);color:var(--wood-light);}

.turntable-wrap{position:relative;display:flex;justify-content:center;align-items:center;}
.vinyl-spin{animation:spin 9s linear infinite;transform-origin:200px 200px;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

.waves{position:relative;height:120px;margin-top:36px;overflow:hidden;}
.wave-svg{position:absolute;bottom:-10px;left:0;width:200%;height:100%;}
.wave-back{animation:driftA 26s linear infinite;opacity:.35;}
.wave-front{animation:driftB 18s linear infinite;opacity:.55;}
@keyframes driftA{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes driftB{from{transform:translateX(-50%)}to{transform:translateX(0)}}

@media (prefers-reduced-motion:reduce){
  .vinyl-spin,.wave-back,.wave-front{animation:none !important;}
}

/* ---------- sections ---------- */
main{flex:1;width:100%;}
.view{max-width:1180px;margin:0 auto;padding:50px 28px 90px;}
.section-head{margin-bottom:30px;}
.section-head .eyebrow{font-family:var(--font-mono);font-size:12px;letter-spacing:2px;color:var(--wood-light);text-transform:uppercase;}
.section-head h2{font-family:var(--font-display);font-size:30px;margin:6px 0 8px;}
.section-head p{color:var(--ink-dim);font-size:14px;max-width:520px;}

/* about */
.about-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:36px;align-items:start;}
.about-card{
  background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--radius-lg);
  padding:30px 28px;
}
.about-card p{color:var(--ink-dim);font-size:15px;margin:0 0 14px;white-space:pre-line;}
.feature-list{display:flex;flex-direction:column;gap:14px;}
.feature-item{
  display:flex;gap:14px;align-items:flex-start;
  background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--radius);padding:16px 18px;
}
.feature-dot{width:8px;height:8px;border-radius:50%;background:var(--wood-light);margin-top:6px;flex:none;}
.feature-item b{display:block;font-size:14px;margin-bottom:3px;}
.feature-item span{font-size:13px;color:var(--ink-faint);}

/* tabs / chips */
.subtabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px;}
.subtab{
  background:var(--panel);border:1px solid var(--line-soft);color:var(--ink-dim);
  padding:9px 18px;border-radius:999px;font-size:13px;transition:.16s;
}
.subtab:hover{border-color:var(--wood-dark);color:var(--ink);}
.subtab.active{background:var(--wood);border-color:var(--wood);color:#1d1209;font-weight:600;}

/* menu list */
.menu-board{
  background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--radius-lg);
  padding:8px 0;
}
.menu-row{
  display:flex;justify-content:space-between;align-items:baseline;gap:16px;
  padding:18px 26px;border-bottom:1px dashed var(--line-soft);
}
.menu-row:last-child{border-bottom:none;}
.menu-row .m-name{font-size:16px;font-weight:600;}
.menu-row .m-desc{font-size:12.5px;color:var(--ink-faint);margin-top:4px;}
.menu-row .m-price{font-family:var(--font-mono);color:var(--wood-light);font-size:15px;white-space:nowrap;}
.empty-note{
  padding:34px 26px;text-align:center;color:var(--ink-faint);font-size:13.5px;
}

/* lp search + grid */
.lp-toolbar{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
.search-box{
  flex:1;min-width:220px;display:flex;align-items:center;gap:10px;
  background:var(--panel);border:1px solid var(--line-soft);border-radius:999px;
  padding:11px 18px;
}
.search-box input{
  background:none;border:none;color:var(--ink);font-size:14px;width:100%;outline:none;font-family:var(--font-body);
}
.search-box input::placeholder{color:var(--ink-faint);}
.search-box svg{flex:none;color:var(--ink-faint);}
.lp-hint{font-size:12.5px;color:var(--ink-faint);margin:-6px 0 22px;}

.lp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(216px,1fr));gap:20px;}
.lp-card{
  background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--radius-lg);
  padding:16px;display:flex;flex-direction:column;gap:12px;transition:.18s;
}
.lp-card:hover{border-color:var(--wood-dark);transform:translateY(-2px);}
.lp-sleeve{
  position:relative;aspect-ratio:1/1;border-radius:var(--radius);
  background:linear-gradient(135deg,var(--panel-2),#171513 70%);
  border:1px solid var(--line-soft);overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.lp-sleeve .disc{
  width:74%;height:74%;border-radius:50%;
  background:repeating-radial-gradient(circle,#0c0b0a 0 3px,#171513 3px 6px);
  box-shadow:0 6px 18px rgba(0,0,0,.5);
  position:relative;
}
.lp-sleeve .disc::after{
  content:'';position:absolute;inset:35%;border-radius:50%;
  background:radial-gradient(circle, var(--wood-light), var(--wood) 70%, var(--wood-dark));
}
.lp-sleeve .disc::before{
  content:'';position:absolute;inset:47%;border-radius:50%;background:var(--black);
}
.lp-code{
  position:absolute;top:8px;left:8px;font-family:var(--font-mono);font-size:10px;
  color:var(--ink-faint);background:rgba(18,17,16,.7);padding:2px 6px;border-radius:4px;letter-spacing:.5px;
}
.lp-genre-tag{
  position:absolute;top:8px;right:8px;font-size:10px;color:var(--ink-dim);
  background:rgba(18,17,16,.7);padding:2px 7px;border-radius:4px;
}
.lp-meta b{font-size:14.5px;display:block;}
.lp-meta span{font-size:12.5px;color:var(--ink-faint);}

/* footer */
footer{
  border-top:1px solid var(--line-soft);
  background:linear-gradient(180deg,var(--panel) 0%, #171410 100%);
  padding:36px 28px;margin-top:auto;
}
.footer-inner{max-width:1180px;margin:0 auto;display:flex;justify-content:space-between;flex-wrap:wrap;gap:24px;}
.footer-brand{font-family:var(--font-display);font-size:18px;margin-bottom:6px;}
.footer-note{font-size:13px;color:var(--ink-faint);max-width:380px;}
.footer-info{font-size:13px;color:var(--ink-dim);display:flex;flex-direction:column;gap:4px;}
.footer-info span{color:var(--ink-faint);font-family:var(--font-mono);font-size:11px;margin-right:6px;}
.settings-icon-btn{
  margin-top:8px;align-self:flex-start;
  background:none;border:1px solid var(--line);color:var(--ink-faint);
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:.18s;
}
.settings-icon-btn:hover{color:var(--wood-light);border-color:var(--wood-dark);transform:rotate(35deg);}
.footer-bottom{max-width:1180px;margin:18px auto 0;padding-top:16px;border-top:1px solid var(--line-soft);font-size:11.5px;color:var(--ink-faint);}

.admin-login-strip{
  border-top:1px solid var(--line-soft);
  background:var(--black);
  padding:18px 28px;
}
.admin-login-inner{
  max-width:1180px;margin:0 auto;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.admin-login-label{
  font-family:var(--font-mono);font-size:11px;letter-spacing:1px;color:var(--ink-faint);
  text-transform:uppercase;flex:none;
}
.admin-login-inner input{
  background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
  padding:9px 13px;border-radius:var(--radius);font-size:13px;outline:none;
  width:220px;max-width:100%;font-family:var(--font-body);
}
.admin-login-inner input:focus{border-color:var(--wood-light);}
.admin-login-inner .btn{padding:9px 18px;font-size:13px;}
.admin-login-inner .error-text{margin:0;flex:none;}

/* ---------- modal ---------- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(8,7,6,.72);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(3px);
}
.modal-box{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-lg);
  width:100%;max-width:420px;padding:30px 28px;box-shadow:var(--shadow);
  position:relative;
}
.modal-box.wide{max-width:780px;max-height:86vh;display:flex;flex-direction:column;padding:0;overflow:hidden;}
.modal-close{
  position:absolute;top:14px;right:14px;background:none;border:none;color:var(--ink-faint);
  font-size:20px;width:32px;height:32px;border-radius:50%;
}
.modal-close:hover{color:var(--ink);background:var(--line-soft);}
.modal-box h3{font-family:var(--font-display);font-size:21px;margin:0 0 6px;}
.modal-sub{font-size:12.5px;color:var(--ink-faint);margin:0 0 22px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:var(--ink-dim);margin-bottom:6px;letter-spacing:.2px;}
.field input,.field textarea,.field select{
  width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
  padding:11px 13px;border-radius:var(--radius);font-size:14px;font-family:var(--font-body);outline:none;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--wood-light);}
.field textarea{resize:vertical;min-height:70px;}
.error-text{color:var(--danger-light);font-size:12.5px;margin:4px 0 0;min-height:16px;}
.modal-actions{display:flex;gap:10px;margin-top:18px;}
.modal-actions .btn{flex:1;text-align:center;}

/* admin modal */
.admin-head{
  padding:22px 26px;border-bottom:1px solid var(--line-soft);
  display:flex;align-items:center;justify-content:space-between;flex:none;
}
.admin-head h3{margin:0;font-family:var(--font-display);font-size:20px;}
.admin-tabs{display:flex;gap:6px;padding:14px 26px 0;flex:none;flex-wrap:wrap;}
.admin-tab{
  background:none;border:none;color:var(--ink-faint);padding:10px 4px;font-size:13px;
  border-bottom:2px solid transparent;margin-right:14px;
}
.admin-tab.active{color:var(--wood-light);border-color:var(--wood-light);}
.admin-body{padding:22px 26px 30px;overflow-y:auto;flex:1;}
.admin-pane{display:none;}
.admin-pane.active{display:block;}
.admin-grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;}
.admin-section-title{font-size:13px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.5px;margin:22px 0 12px;}
.admin-section-title:first-child{margin-top:0;}
.row-card{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:var(--panel-2);border:1px solid var(--line-soft);border-radius:var(--radius);
  padding:11px 14px;margin-bottom:8px;
}
.row-card .row-main{font-size:14px;}
.row-card .row-sub{font-size:11.5px;color:var(--ink-faint);margin-top:2px;}
.row-actions{display:flex;gap:6px;flex:none;}
.icon-btn{
  background:none;border:1px solid var(--line);color:var(--ink-faint);
  border-radius:6px;padding:6px 10px;font-size:12px;
}
.icon-btn:hover{color:var(--ink);border-color:var(--ink-faint);}
.icon-btn.danger{color:var(--danger-light);border-color:transparent;}
.icon-btn.danger:hover{border-color:var(--danger);background:rgba(181,72,63,.1);}
.icon-btn.danger.confirming{background:var(--danger);color:#fff;border-color:var(--danger);}
.inline-form{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.inline-form input,.inline-form select{
  flex:1;min-width:120px;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
  padding:9px 12px;border-radius:var(--radius);font-size:13px;
}
.inline-form .btn{padding:9px 16px;font-size:13px;flex:none;}
.mini-input{
  width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
  padding:8px 11px;border-radius:6px;font-size:13px;font-family:var(--font-body);outline:none;
}
.mini-input:focus{border-color:var(--wood-light);}
.divider{height:1px;background:var(--line-soft);margin:20px 0;}
.muted-block{font-size:12.5px;color:var(--ink-faint);background:var(--panel-2);border:1px solid var(--line-soft);border-radius:var(--radius);padding:12px 14px;}

/* toast */
#toast{
  position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--ink);color:#1a1510;padding:11px 22px;border-radius:999px;font-size:13px;font-weight:600;
  z-index:200;opacity:0;pointer-events:none;transition:.25s;box-shadow:var(--shadow);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* loading */
#loading{
  position:fixed;inset:0;background:var(--black);color:var(--ink-faint);
  display:flex;align-items:center;justify-content:center;font-size:13px;letter-spacing:1px;z-index:300;
  font-family:var(--font-mono);
}

/* responsive */
@media (max-width:880px){
  .hero{grid-template-columns:1fr;padding-top:40px;}
  .turntable-wrap svg{width:240px;}
  .about-grid{grid-template-columns:1fr;}
  .admin-grid2{grid-template-columns:1fr;}
}
@media (max-width:680px){
  .nav-links{display:none;}
  .nav-burger{display:flex;}
  .nav-mobile.open{
    display:flex;flex-direction:column;gap:4px;position:absolute;top:64px;left:0;right:0;
    background:var(--panel);border-bottom:1px solid var(--line-soft);padding:12px;z-index:39;
  }
  .nav-mobile .nav-link,.nav-mobile .nav-admin{width:100%;text-align:left;border-radius:8px;}
  .footer-inner{flex-direction:column;}
  .modal-box.wide{max-height:92vh;}
  .menu-row{padding:16px 18px;}
  .admin-login-inner{flex-direction:column;align-items:stretch;}
  .admin-login-inner input{width:100%;}
}
</style>
</head>
<body>

<div id="loading">불러오는 중…</div>

<div id="app" style="display:none;">
  <header class="nav">
    <div class="brand" id="brandBlock">
      <div class="brand-mark" id="brandMark">N</div>
      <div class="brand-text">
        <span class="brand-name" id="brandName">Needle</span>
        <span class="brand-tagline" id="brandTagline">파도, 커피 그리고 턴테이블</span>
      </div>
    </div>
    <nav class="nav-links" id="navLinks"></nav>
    <button class="nav-burger" id="burgerBtn" aria-label="메뉴 열기"><span></span></button>
  </header>
  <div class="nav-mobile" id="navMobile"></div>

  <main id="mainContent"></main>

  <footer>
    <div class="footer-inner">
      <div>
        <div class="footer-brand" id="footBrand">Needle</div>
        <div class="footer-note" id="footNote">파도 소리와 턴테이블 위 바늘이 만나는 곳.</div>
      </div>
      <div class="footer-info">
        <div><span>ADDRESS</span><span id="footAddress"></span></div>
        <div><span>EMAIL</span><span id="footEmail"></span></div>
        <div><span>BIZ</span><span id="footBiz"></span></div>
        <button class="settings-icon-btn" id="settingsIconBtn" aria-label="관리자 설정" title="관리자 설정">

/* ================= state ================= */
var state = {
  data:null,
  isAdmin:false,
  view:"about",
  menuSub:null,
  lpSub:"all",
  lpSearch:"",
  storageOk:true
};

/* ================= utils ================= */
function esc(str){
  return String(str==null?"":str).replace(/[&<>"']/g, function(c){
    return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c];
  });
}
function uid(prefix){ return prefix + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function fmtPrice(n){ var v = Number(n)||0; return v.toLocaleString("ko-KR") + "원"; }
function findCat(id){ return state.data.categories.find(function(c){return c.id===id;}); }
function toast(msg){
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.classList.remove("show"); }, 2400);
}

/* ================= storage ================= */
function normalizeData(data){
  var d = defaultData();
  data.site = Object.assign({}, d.site, data.site||{});
  if(!Array.isArray(data.site.aboutFeatures) || !data.site.aboutFeatures.length){
    data.site.aboutFeatures = d.site.aboutFeatures;
  }
  if(!Array.isArray(data.categories)) data.categories = d.categories;
  return data;
}
function loadData(){
  return window.storage.get(STORAGE_KEY, true)
    .then(function(res){
      if(res && res.value){
        try{ state.data = normalizeData(JSON.parse(res.value)); }
        catch(e){ state.data = defaultData(); }
      } else {
        state.data = defaultData();
      }
    })
    .catch(function(){
      state.data = defaultData();
      state.storageOk = false;
    });
}
function saveData(){
  return window.storage.set(STORAGE_KEY, JSON.stringify(state.data), true)
    .then(function(res){
      if(!res){ throw new Error("save failed"); }
      toast("저장되었습니다");
    })
    .catch(function(){
      state.storageOk = false;
      toast("저장에 실패했습니다 (이 환경에서는 변경이 유지되지 않을 수 있어요)");
    });
}

/* ================= render: shell ================= */

  var s = state.data.site;
  document.getElementById("brandName").textContent = s.name;
  document.getElementById("brandTagline").textContent = s.tagline;
  var mark = document.getElementById("brandMark");
  if(s.logoImage){
    mark.innerHTML = '<img src="'+esc(s.logoImage)+'" alt="logo">';
  } else {
    mark.textContent = (s.logoText||"N").slice(0,2);
  }
  document.title = s.name + " — " + s.tagline;

  document.getElementById("footBrand").textContent = s.name;
  document.getElementById("footNote").textContent = s.footerNote;
  document.getElementById("footAddress").textContent = s.address;
  document.getElementById("footEmail").textContent = s.email;
  document.getElementById("footBiz").textContent = s.business;
  document.getElementById("footBottom").textContent = "© " + new Date().getFullYear() + " " + s.name + ". All rights reserved.";

  renderNav();
}
function renderNav(){
  var links = state.data.categories.map(function(c){
    return '<button class="nav-link'+(state.view===c.id?' active':'')+'" data-view="'+c.id+'">'+esc(c.name)+'</button>';
  }).join("");

  document.getElementById("navLinks").innerHTML = links;
  document.getElementById("navMobile").innerHTML = links;

  document.querySelectorAll(".nav-link").forEach(function(b){
    b.addEventListener("click", function(){
      switchView(b.getAttribute("data-view"));
      document.getElementById("navMobile").classList.remove("open");
    });
  });
}

/* ================= render: views ================= */
function switchView(id){
  state.view = id;
  renderNav();
  renderMain();
}

function renderMain(){
  var cat = findCat(state.view);
  if(!cat){ cat = state.data.categories[0]; state.view = cat.id; }
  var el = document.getElementById("mainContent");
  if(cat.kind === "about"){
    el.innerHTML = renderAboutHTML(cat);
    bindAboutEvents(cat);
  } else if(cat.kind === "menu"){
    if(!state.menuSub || !cat.subcategories.find(function(s){return s.id===state.menuSub;})){
      state.menuSub = cat.subcategories[0] ? cat.subcategories[0].id : null;
    }
    el.innerHTML = renderMenuHTML(cat);
    bindMenuEvents(cat);
  } else if(cat.kind === "lp"){
    el.innerHTML = renderLPHTML(cat);
    bindLPEvents(cat);
  }
}

function renderMenuHTML(cat){
  var subs = cat.subcategories||[];
  var tabs = subs.map(function(s){
    return '<button class="subtab'+(s.id===state.menuSub?' active':'')+'" data-sub="'+s.id+'">'+esc(s.name)+'</button>';
  }).join("");
  var active = subs.find(function(s){return s.id===state.menuSub;});
  var rows;
  if(!active || !active.items.length){
    rows = '<div class="empty-note">아직 등록된 메뉴가 없습니다. 관리자 패널에서 추가해보세요.</div>';
  } else {
    rows = active.items.map(function(it){
      return '<div class="menu-row">'+
        '<div><div class="m-name">'+esc(it.name)+'</div>'+(it.desc?'<div class="m-desc">'+esc(it.desc)+'</div>':'')+'</div>'+
        '<div class="m-price">'+fmtPrice(it.price)+'</div>'+
      '</div>';
    }).join("");
  }
  return ''+
  '<div class="view">'+
    '<div class="section-head">'+
      '<div class="eyebrow">MENU</div>'+
      '<h2>'+esc(cat.name)+'</h2>'+
      '<p>커피와 음료, 가벼운 술과 디저트까지 — 음반 한 장을 들으며 즐겨보세요.</p>'+
    '</div>'+
    '<div class="subtabs">'+tabs+'</div>'+
    '<div class="menu-board">'+rows+'</div>'+
  '</div>';

function getLPFilteredList(cat){
  var subs = cat.subcategories||[];
  var allItems = [];
  subs.forEach(function(s){ s.items.forEach(function(it){ allItems.push(Object.assign({}, it, {subId:s.id, subName:s.name})); }); });

  var searching = state.lpSearch.trim().length>0;
  var list;
  if(searching){
    var q = state.lpSearch.trim().toLowerCase();
    list = allItems.filter(function(it){
      return (it.title||"").toLowerCase().indexOf(q)>-1 || (it.artist||"").toLowerCase().indexOf(q)>-1;
    });
  } else {
    if(state.lpSub === "all"){ list = allItems; }
    else { var s2 = subs.find(function(s){return s.id===state.lpSub;}); list = s2 ? s2.items.map(function(it){return Object.assign({},it,{subId:s2.id,subName:s2.name});}) : []; }
  }
  return {list:list, searching:searching};
}

function computeLPChipsHTML(cat){
  var searching = state.lpSearch.trim().length>0;
  var subs = cat.subcategories||[];
  return '<button class="subtab'+(state.lpSub==="all"&&!searching?' active':'')+'" data-lpsub="all">전체</button>'+
    subs.map(function(s){
      return '<button class="subtab'+(s.id===state.lpSub&&!searching?' active':'')+'" data-lpsub="'+s.id+'">'+esc(s.name)+'</button>';
    }).join("");
}

function computeLPGridHTML(cat){
  var r = getLPFilteredList(cat);
  if(!r.list.length){
    return '<div class="empty-note">'+(r.searching ? "검색 결과가 없습니다. 다른 제목이나 아티스트로 찾아보세요." : "아직 등록된 음반이 없습니다. 관리자 패널에서 추가해보세요.")+'</div>';
  }
  return '<div class="lp-grid">'+r.list.map(function(it){
    return '<div class="lp-card">'+
      '<div class="lp-sleeve"><span class="lp-code">'+esc(it.code||"")+'</span><span class="lp-genre-tag">'+esc(it.subName||"")+'</span><div class="disc"></div></div>'+
      '<div class="lp-meta"><b>'+esc(it.title)+'</b><span>'+esc(it.artist)+(it.year?' · '+esc(it.year):'')+'</span></div>'+
    '</div>';
  }).join("")+'</div>';
}

        '<input type="text" id="lpSearchInput" placeholder="제목 또는 아티스트 검색" value="'+esc(state.lpSearch)+'">'+

function bindAboutEvents(cat){

function bindMenuEvents(cat){

/* LP: 검색창(input)은 다시 그리지 않고, 칩과 결과 영역만 갱신한다.
   매 입력마다 input을 통째로 다시 만들면 한글 등 조합형 입력(IME)이 입력 중간에 끊기므로
   여기서는 input 자체는 한 번만 만들고, 그 외 영역만 부분 갱신한다. */
function refreshLPResults(cat){
  var chipsEl = document.getElementById("lpChips");
  var resultsEl = document.getElementById("lpResultsArea");
  if(chipsEl) chipsEl.innerHTML = computeLPChipsHTML(cat);
  if(resultsEl) resultsEl.innerHTML = computeLPGridHTML(cat);
  bindLPChipClicks(cat);
}
function bindLPChipClicks(cat){
  document.querySelectorAll(".subtab[data-lpsub]").forEach(function(b){
    b.addEventListener("click", function(){
      state.lpSub = b.getAttribute("data-lpsub");
      state.lpSearch = "";
      var input = document.getElementById("lpSearchInput");
      if(input) input.value = "";
      refreshLPResults(cat);
    });
  });
}
function bindLPEvents(cat){
  bindLPChipClicks(cat);
  var input = document.getElementById("lpSearchInput");
  if(input){
    input.addEventListener("input", function(){
      state.lpSearch = input.value;
      refreshLPResults(cat);
    });
  }
}

/* ================= admin: login ================= */
function toggleAdminLogin(){
  var strip = document.getElementById("adminLoginStrip");
  var nowHidden = strip.classList.toggle("hidden");
  if(!nowHidden){
    strip.scrollIntoView({behavior:"smooth", block:"center"});
    setTimeout(function(){ document.getElementById("pwInlineInput").focus(); }, 350);
  }
}
function attemptInlineLogin(){
  var input = document.getElementById("pwInlineInput");
  var errorEl = document.getElementById("pwInlineError");
  var val = input.value;
  if(val === ADMIN_PASSWORD){
    errorEl.textContent = "";
    input.value = "";
    state.isAdmin = true;
    document.getElementById("adminLoginStrip").classList.add("hidden");
    openAdmin();
  } else {
    errorEl.textContent = "비밀번호가 올바르지 않습니다.";
    var strip = document.getElementById("adminLoginStrip");
    strip.style.transform = "translateX(-6px)";
    setTimeout(function(){ strip.style.transform = ""; }, 90);
  }
}

/* ================= admin: panel ================= */
function openAdmin(){
  document.getElementById("adminOverlay").classList.remove("hidden");
  renderAdminAll();
}
function closeAdmin(){ document.getElementById("adminOverlay").classList.add("hidden"); }

function renderAdminAll(){
  renderAdminSite();
  renderAdminAbout();
  renderAdminCats();
  renderAdminItems();
}

function renderAdminSite(){
  var s = state.data.site;
  var html = ''+
  '<div class="admin-section-title">기본 정보</div>'+
  '<div class="admin-grid2">'+
    field("siteName","사이트 이름", s.name)+
    field("siteTagline","태그라인", s.tagline)+
  '</div>'+
  '<div class="admin-grid2">'+
    field("siteLogoText","로고 텍스트 (1~2자)", s.logoText)+
    field("siteLogoImage","로고 이미지 URL (선택)", s.logoImage)+
  '</div>'+
  '<div class="admin-section-title">사이트 정보 (하단 표시)</div>'+
  '<div class="field">'+labelOnly("footerNote","아래란 문구")+'<input id="siteFooterNote" value="'+esc(s.footerNote)+'"></div>'+
  '<div class="admin-grid2">'+
    field("siteAddress","주소", s.address)+
    field("siteEmail","이메일", s.email)+
  '</div>'+
  field("siteBusiness","사업자명", s.business)+
  '<button class="btn btn-primary" id="saveSiteBtn" style="margin-top:6px;">사이트 정보 저장</button>';
  document.getElementById("pane-site").innerHTML = html;
  document.getElementById("saveSiteBtn").addEventListener("click", function(){
    s.name = document.getElementById("siteName").value.trim() || s.name;
    s.tagline = document.getElementById("siteTagline").value.trim();
    s.logoText = document.getElementById("siteLogoText").value.trim() || "N";
    s.logoImage = document.getElementById("siteLogoImage").value.trim();
    s.footerNote = document.getElementById("siteFooterNote").value.trim();
    s.address = document.getElementById("siteAddress").value.trim();
    s.email = document.getElementById("siteEmail").value.trim();
    s.business = document.getElementById("siteBusiness").value.trim();
    saveData().then(function(){ renderShell(); renderMain(); });
  });
}

function renderAdminAbout(){
  var s = state.data.site;
  var features = s.aboutFeatures||[];
  var html = ''+
  '<div class="admin-section-title">히어로 영역</div>'+
  field("aEyebrow","상단 작은 라벨 (eyebrow)", s.heroEyebrow)+
  '<div class="field"><label for="aHeroText">부제 문구 (제목 아래 설명)</label><textarea id="aHeroText" rows="3">'+esc(s.heroText)+'</textarea></div>'+
  '<div class="admin-grid2">'+
    field("aBtn1","버튼1 텍스트", s.heroBtn1Label)+
    field("aBtn2","버튼2 텍스트", s.heroBtn2Label)+
  '</div>'+
  '<div class="admin-section-title">소개글 본문</div>'+
  '<div class="field"><label for="aAboutText">본문 내용 (소개 카드)</label><textarea id="aAboutText" rows="6">'+esc(s.aboutText)+'</textarea></div>'+
  '<div class="admin-section-title">특징 카드</div>'+
  '<div id="featListWrap">'+renderFeatureRows(features)+'</div>'+
  '<div class="inline-form">'+
    '<input type="text" id="newFeatTitle" placeholder="제목 (예: 직접 고른 LP)">'+
    '<input type="text" id="newFeatDesc" placeholder="설명">'+
    '<button class="btn btn-ghost" id="addFeatBtn" style="flex:none;">특징 추가</button>'+
  '</div>'+
  '<button class="btn btn-primary" id="saveAboutBtn" style="margin-top:18px;">소개글 저장</button>';
  document.getElementById("pane-about").innerHTML = html;

  document.querySelectorAll("[data-delfeat]").forEach(function(b){
    bindConfirmDelete(b, function(){
      s.aboutFeatures = s.aboutFeatures.filter(function(f){ return f.id!==b.getAttribute("data-delfeat"); });
      saveData().then(function(){ renderMain(); renderAdminAbout(); });
    });
  });
  document.getElementById("addFeatBtn").addEventListener("click", function(){
    var t = document.getElementById("newFeatTitle").value.trim();
    var d = document.getElementById("newFeatDesc").value.trim();
    if(!t){ toast("특징 제목을 입력해주세요"); return; }
    s.aboutFeatures.push({id:uid("f"), title:t, desc:d});
    saveData().then(function(){ renderMain(); renderAdminAbout(); });
  });
  document.getElementById("saveAboutBtn").addEventListener("click", function(){
    s.heroEyebrow = document.getElementById("aEyebrow").value.trim();
    s.heroText = document.getElementById("aHeroText").value.trim();
    s.heroBtn1Label = document.getElementById("aBtn1").value.trim() || "메뉴 보기";
    s.heroBtn2Label = document.getElementById("aBtn2").value.trim() || "LP판 둘러보기";
    s.aboutText = document.getElementById("aAboutText").value;
    document.querySelectorAll(".feat-title-input").forEach(function(inp){
      var f = s.aboutFeatures.find(function(x){ return x.id===inp.getAttribute("data-featid"); });
      if(f) f.title = inp.value.trim();
    });
    document.querySelectorAll(".feat-desc-input").forEach(function(inp){
      var f = s.aboutFeatures.find(function(x){ return x.id===inp.getAttribute("data-featid"); });
      if(f) f.desc = inp.value.trim();
    });
    saveData().then(function(){ renderMain(); renderAdminAbout(); });
  });
}
function renderFeatureRows(features){
  if(!features.length){ return '<div class="muted-block">등록된 특징이 없습니다.</div>'; }
  return features.map(function(f){
    return '<div class="row-card" style="align-items:flex-start;">'+
      '<div style="flex:1;display:flex;flex-direction:column;gap:6px;">'+
        '<input type="text" class="mini-input feat-title-input" data-featid="'+f.id+'" value="'+esc(f.title)+'" placeholder="제목">'+
        '<input type="text" class="mini-input feat-desc-input" data-featid="'+f.id+'" value="'+esc(f.desc)+'" placeholder="설명">'+
      '</div>'+
      '<div class="row-actions"><button class="icon-btn danger" data-delfeat="'+f.id+'">삭제</button></div>'+
    '</div>';
  }).join("");
}
function field(id,label,value){
  return '<div class="field"><label for="'+id+'">'+esc(label)+'</label><input id="'+id+'" value="'+esc(value)+'"></div>';
}
function labelOnly(id,label){ return '<label for="'+id+'">'+esc(label)+'</label>'; }

function renderAdminCats(){
  var cats = state.data.categories;
  var html = '<div class="admin-section-title">카테고리</div>';
  cats.forEach(function(c){
    html += '<div class="row-card"><div><div class="row-main">'+esc(c.name)+'</div><div class="row-sub">'+kindLabel(c.kind)+(c.subcategories?' · 소카테고리 '+c.subcategories.length+'개':'')+'</div></div>'+
      '<div class="row-actions">'+(c.kind!=="about"?'<button class="icon-btn danger" data-delcat="'+c.id+'">삭제</button>':'<span class="row-sub">고정 항목</span>')+'</div></div>';
  });
  html += '<div class="inline-form">'+
    '<input type="text" id="newCatName" placeholder="새 카테고리 이름 (예: 굿즈)">'+
    '<select id="newCatKind"><option value="menu">메뉴형 (이름/설명/가격)</option><option value="lp">LP형 (제목/아티스트/연도)</option></select>'+
    '<button class="btn btn-primary" id="addCatBtn">카테고리 추가</button>'+
  '</div>';

  html += '<div class="divider"></div><div class="admin-section-title">소카테고리</div>';
  var subCapable = cats.filter(function(c){ return c.subcategories; });
  if(!subCapable.length){
    html += '<div class="muted-block">소카테고리를 가질 수 있는 카테고리가 없습니다.</div>';
  } else {
    html += '<div class="field"><label>카테고리 선택</label><select id="subCatSelect">'+
      subCapable.map(function(c){ return '<option value="'+c.id+'">'+esc(c.name)+'</option>'; }).join("")+
      '</select></div>'+
      '<div id="subListWrap"></div>'+
      '<div class="inline-form">'+
        '<input type="text" id="newSubName" placeholder="새 소카테고리 이름 (예: 음료)">'+
        '<button class="btn btn-primary" id="addSubBtn">소카테고리 추가</button>'+
      '</div>';
  }
  document.getElementById("pane-cats").innerHTML = html;

  document.querySelectorAll("[data-delcat]").forEach(function(b){ bindConfirmDelete(b, function(){ deleteCategory(b.getAttribute("data-delcat")); }); });
  document.getElementById("addCatBtn").addEventListener("click", function(){
    var name = document.getElementById("newCatName").value.trim();
    if(!name){ toast("카테고리 이름을 입력해주세요"); return; }
    var kind = document.getElementById("newCatKind").value;
    state.data.categories.push({id:uid("c"), name:name, kind:kind, subcategories:[]});
    saveData().then(function(){ renderShell(); renderMain(); renderAdminCats(); renderAdminItems(); });
  });

  var sel = document.getElementById("subCatSelect");
  if(sel){
    function renderSubList(){
      var cat = findCat(sel.value);
      var wrap = document.getElementById("subListWrap");
      if(!cat.subcategories.length){
        wrap.innerHTML = '<div class="muted-block">등록된 소카테고리가 없습니다.</div>';
      } else {
        wrap.innerHTML = cat.subcategories.map(function(s){
          return '<div class="row-card"><div class="row-main">'+esc(s.name)+'</div>'+
            '<div class="row-actions"><span class="row-sub" style="margin-right:6px;">항목 '+s.items.length+'개</span>'+
            '<button class="icon-btn danger" data-delsub="'+s.id+'" data-cat="'+cat.id+'">삭제</button></div></div>';
        }).join("");
        wrap.querySelectorAll("[data-delsub]").forEach(function(b){
          bindConfirmDelete(b, function(){ deleteSubcategory(b.getAttribute("data-cat"), b.getAttribute("data-delsub")); });
        });
      }
    }
    renderSubList();
    sel.addEventListener("change", renderSubList);
    document.getElementById("addSubBtn").addEventListener("click", function(){
      var name = document.getElementById("newSubName").value.trim();
      if(!name){ toast("소카테고리 이름을 입력해주세요"); return; }
      var cat = findCat(sel.value);
      cat.subcategories.push({id:uid("s"), name:name, items:[]});
      saveData().then(function(){ renderMain(); renderAdminCats(); renderAdminItems(); });
    });
  }
}
function kindLabel(k){ return k==="about" ? "소개글 페이지" : (k==="lp" ? "LP형 카테고리" : "메뉴형 카테고리"); }

function deleteCategory(id){
  state.data.categories = state.data.categories.filter(function(c){ return c.id!==id; });
  if(state.view===id){ state.view = state.data.categories[0].id; }
  saveData().then(function(){ renderShell(); renderMain(); renderAdminCats(); renderAdminItems(); });
}
function deleteSubcategory(catId, subId){
  var cat = findCat(catId);
  cat.subcategories = cat.subcategories.filter(function(s){ return s.id!==subId; });
  if(state.menuSub===subId) state.menuSub = null;
  saveData().then(function(){ renderMain(); renderAdminCats(); renderAdminItems(); });
}

function renderAdminItems(){
  var cats = state.data.categories.filter(function(c){ return c.subcategories; });
  var pane = document.getElementById("pane-items");
  if(!cats.length){
    pane.innerHTML = '<div class="muted-block">항목을 추가할 수 있는 카테고리가 없습니다. 먼저 카테고리를 만들어주세요.</div>';
    return;
  }
  var html = '<div class="admin-grid2">'+
    '<div class="field"><label>카테고리</label><select id="itemCatSelect">'+
      cats.map(function(c){ return '<option value="'+c.id+'">'+esc(c.name)+'</option>'; }).join("")+
    '</select></div>'+
    '<div class="field"><label>소카테고리</label><select id="itemSubSelect"></select></div>'+
  '</div>'+
  '<div id="itemListWrap"></div>'+
  '<div class="divider"></div>'+
  '<div class="admin-section-title">새 항목 추가</div>'+
  '<div id="itemFormWrap"></div>';
  pane.innerHTML = html;

  var catSel = document.getElementById("itemCatSelect");
  var subSel = document.getElementById("itemSubSelect");

  function fillSub(){
    var cat = findCat(catSel.value);
    subSel.innerHTML = cat.subcategories.map(function(s){ return '<option value="'+s.id+'">'+esc(s.name)+'</option>'; }).join("");
    if(!cat.subcategories.length){ subSel.innerHTML = '<option value="">소카테고리 없음</option>'; }
    renderItemArea();
  }
  function renderItemArea(){
    var cat = findCat(catSel.value);
    var sub = cat.subcategories.find(function(s){ return s.id===subSel.value; });
    var listWrap = document.getElementById("itemListWrap");
    var formWrap = document.getElementById("itemFormWrap");
    if(!sub){
      listWrap.innerHTML = '<div class="muted-block">먼저 소카테고리를 추가해주세요.</div>';
      formWrap.innerHTML = "";
      return;
    }
    if(!sub.items.length){
      listWrap.innerHTML = '<div class="muted-block">등록된 항목이 없습니다.</div>';
    } else {
      listWrap.innerHTML = sub.items.map(function(it){
        var main = cat.kind==="lp" ? (it.title+" — "+it.artist) : it.name;
        var subline = cat.kind==="lp" ? (it.code||"")+(it.year?(' · '+it.year):'') : (it.desc?it.desc+' · ':'')+fmtPrice(it.price);
        return '<div class="row-card"><div><div class="row-main">'+esc(main)+'</div><div class="row-sub">'+esc(subline)+'</div></div>'+
          '<div class="row-actions"><button class="icon-btn danger" data-delitem="'+it.id+'">삭제</button></div></div>';
      }).join("");
      listWrap.querySelectorAll("[data-delitem]").forEach(function(b){
        bindConfirmDelete(b, function(){
          sub.items = sub.items.filter(function(it){ return it.id!==b.getAttribute("data-delitem"); });
          saveData().then(function(){ renderMain(); renderAdminItems(); });
        });
      });
    }
    if(cat.kind==="lp"){
      formWrap.innerHTML = '<div class="inline-form">'+
        '<input type="text" id="newTitle" placeholder="제목">'+
        '<input type="text" id="newArtist" placeholder="아티스트">'+
        '<input type="text" id="newYear" placeholder="연도" style="max-width:90px;">'+
        '<input type="text" id="newCode" placeholder="카탈로그 코드 (예: NDL-701)" style="max-width:170px;">'+
        '<button class="btn btn-primary" id="addItemBtn">추가</button>'+
      '</div>';
    } else {
      formWrap.innerHTML = '<div class="inline-form">'+
        '<input type="text" id="newName" placeholder="이름">'+
        '<input type="text" id="newDesc" placeholder="설명 (선택)">'+
        '<input type="number" id="newPrice" placeholder="가격" style="max-width:110px;">'+
        '<button class="btn btn-primary" id="addItemBtn">추가</button>'+
      '</div>';
    }
    document.getElementById("addItemBtn").addEventListener("click", function(){
      if(cat.kind==="lp"){
        var title = document.getElementById("newTitle").value.trim();
        var artist = document.getElementById("newArtist").value.trim();
        if(!title || !artist){ toast("제목과 아티스트를 입력해주세요"); return; }
        sub.items.push({id:uid("l"), title:title, artist:artist, year:document.getElementById("newYear").value.trim(), code:document.getElementById("newCode").value.trim()});
      } else {
        var name = document.getElementById("newName").value.trim();
        if(!name){ toast("이름을 입력해주세요"); return; }
        sub.items.push({id:uid("m"), name:name, desc:document.getElementById("newDesc").value.trim(), price:Number(document.getElementById("newPrice").value)||0});
      }
      saveData().then(function(){ renderMain(); renderAdminItems(); });
    });
  }
  catSel.addEventListener("change", fillSub);
  subSel.addEventListener("change", renderItemArea);
  fillSub();
}

function bindConfirmDelete(btn, onConfirm){
  btn.addEventListener("click", function(){
    if(btn.classList.contains("confirming")){
      clearTimeout(btn._t);
      onConfirm();
    } else {
      btn.classList.add("confirming");
      btn.textContent = "정말 삭제?";
      btn._t = setTimeout(function(){
        btn.classList.remove("confirming");
        btn.textContent = "삭제";
      }, 2800);
    }
  });
}

/* ================= boot ================= */
function bindStatic(){
  document.getElementById("settingsIconBtn").addEventListener("click", toggleAdminLogin);
  document.getElementById("pwInlineSubmitBtn").addEventListener("click", attemptInlineLogin);
  document.getElementById("pwInlineInput").addEventListener("keydown", function(e){ if(e.key==="Enter") attemptInlineLogin(); });

  document.getElementById("adminCloseBtn").addEventListener("click", closeAdmin);
  document.getElementById("adminOverlay").addEventListener("click", function(e){ if(e.target===this) closeAdmin(); });
  document.querySelectorAll(".admin-tab").forEach(function(t){
    t.addEventListener("click", function(){
      document.querySelectorAll(".admin-tab").forEach(function(x){ x.classList.remove("active"); });
      document.querySelectorAll(".admin-pane").forEach(function(x){ x.classList.remove("active"); });
      t.classList.add("active");
      document.getElementById("pane-"+t.getAttribute("data-tab")).classList.add("active");
    });
  });

  document.getElementById("burgerBtn").addEventListener("click", function(){
    document.getElementById("navMobile").classList.toggle("open");
  });
}

function boot(){

}
boot();
